<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | HBO Max</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>
    <nav>
        <a href="index.html"><img src="assets/images/hbo-logo.svg" alt=""></a>
        <div id="nav-links">
            <a href="signIn.html" class="btn-login">ENTRAR</a>
            <a href="#main" class="btn-subscribe">ASSINE AGORA</a>
        </div>
    </nav>

    <main>
        <form action="#" method="get" class="container">
            <p>ENTRAR</p>
            <div class="login">
                <p>Você tem uma conta da HBO Max?</p>
                <input type="email" id="login-email" placeholder="Endereço de e-mail" required>
                <input type="password" name="login-password" id="login-password" placeholder="Senha" required>
            </div>
            <div class="botoes">
                <button class="btn-entrar button--gradient" type="submit">Entrar</button>
                <a href="" class="btn-nova-senha">Esqueceu sua senha?</a>
            </div>
        </form>
    </main>

    <footer>
        <div class="links">
            <a href="">Agora na HBO Max</a>
            <a href="">Em breve</a>
            <a href="">Filme em destaque</a>
            <a href="">Séries</a>
            <a href="">Ajuda</a>
        </div>

        <p>© 2022 WarnerMedia Direct Latin America, LLC. Todos os direitos reservados. HBO Max é usado sob licença.</p>

        <div id="social-media">
            <img src="assets/images/fb_0.png" alt="">
            <img src="assets/images/twitter_0.png" alt="">
            <img src="assets/images/instagram_0.png" alt="">
            <img src="assets/images/youtube_0.png" alt="">
        </div>
    </footer>

</body>

</html>
